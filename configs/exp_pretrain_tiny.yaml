# TinyGPT 预训练配置
# 用法: python scripts/pretrain_tiny.py --config configs/exp_pretrain_tiny.yaml

# 模型配置
model_preset: "small"       # tiny | small | medium
block_size: 256
vocab_size: 8000

# 训练配置
epochs: 50
batch_size: 8
learning_rate: 5.0e-4
weight_decay: 0.1
warmup_ratio: 0.1

# 数据配置
corpus_path: "data/raw/domain_corpus_cleaned.txt"
tokenizer_path: "outputs/tokenizers/bpe_domain/tokenizer.json"

# 输出配置
output_dir: "outputs/checkpoints/pretrain_tiny"
log_interval: 10
save_every: 10
use_amp: true

# 训练数据不足时的自动重复
data_repeat: 3
